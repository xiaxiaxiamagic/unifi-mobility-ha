name: Bug report
description: Report a problem with UniFi Mobility
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Please attach Home Assistant diagnostics after checking that sensitive values are redacted.
  - type: input
    id: model
    attributes:
      label: Router model and firmware
    validations:
      required: true
  - type: input
    id: ha
    attributes:
      label: Home Assistant version
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: text
