name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Build HACS archive
        run: cd custom_components/unifi_mobility && zip -r ../../unifi_mobility.zip .
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          notes=".github/release-notes/${GITHUB_REF_NAME}.md"
          if [ -f "$notes" ]; then
            gh release create "${GITHUB_REF_NAME}" unifi_mobility.zip --notes-file "$notes" --title "UniFi Mobility ${GITHUB_REF_NAME}"
          else
            gh release create "${GITHUB_REF_NAME}" unifi_mobility.zip --generate-notes --title "UniFi Mobility ${GITHUB_REF_NAME}"
          fi
